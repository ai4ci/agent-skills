project_name:
    type: str
    help: What is your project name?
    default: {{ _folder_name }}

harness:
    type: yaml
    choices:
        opencode:
            value: &opencode
                config: ".opencode"
        claude:
            value: &claude
                config: ".claude"
        copilot:
            value: &copilot
                config: ".github"
    default: *opencode


_subdirectory: copier-template
